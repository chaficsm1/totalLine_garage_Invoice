<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    :root {
      --brand-blue: #0066cc;
      --pass-green: #2e7d32;
      --fail-red: #c62828;
      --na-gray: #9e9e9e;

      --bg-light: #fafafa;
      --text-main: #212121;

    }

    .section-title {
    font-size: 1.1rem;

    color: var(--brand-blue);
    margin-bottom: 0.5rem;
    margin-top: 1.5rem;
  }



    * {

    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
      color: var(--text-main);
    }

    .app {
      max-width: 900px;

      padding: 0 1rem 2rem;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 0 0.75rem;
      background: #ffffff;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-img {
      height: 52px;
      width: auto;
      object-fit: contain;

    }

    .header-title {
      font-size: 1.1rem;

      color: var(--brand-blue);
    }

    .header-right {
      text-align: right;

    }

    .header-divider {

      background: var(--border-light);

    .job-info {

    .section-band {

      gap: 0.75rem;
      padding: 0.6rem 0;

      font-size: 0.88rem;

      align-items: center;

    .status-option {

    canvas.signature-pad {
      width: 100%;
      height: 140px;
      border-radius: 6px;

      background: #ffffff;
      touch-action: none;
    }

    .small-btn {
      border: none;
      border-radius: 999px;
      padding: 0.2rem 0.7rem;
      font-size: 0.75rem;
      cursor: pointer;

    .actions {

    @media (max-width: 600px) {
      .item-row-horizontal {
        grid-template-columns: 1fr;
      }
      .info-grid.three-col,

        grid-template-columns: 1fr;

    .header-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
  }

  .header-company {

  grid-template-columns: 2fr 0.6fr 0.8fr 0.8fr 40px;

}

.item-desc {

 .quote-disclaimer {

.no-print {

}

  </style>

      <div class="actions">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
/* ============================================================
   STORAGE
============================================================ */

const STORAGE_KEY = "totalLine_inspection_v1";

function loadState() {
  const raw = localStorage.getItem(STORAGE_KEY);
  return raw ? JSON.parse(raw) : { job:{}, statuses:{}, notes:{} };
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
}

let appState = loadState();

/* ============================================================
   JOB INFO
============================================================ */

const jobFields = [
  "custName","custStreet","custCity","custZip",
  "custPhone","custEmail",
  "techName","techPhone","techEmail"
];

function loadJobInfo() {
  jobFields.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    if (appState.job[id] !== undefined) el.value = appState.job[id];
  });
}

function bindJobInfo() {
  jobFields.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener("input", () => {
      appState.job[id] = el.value;
      saveState();
    });
  });
}

/* ============================================================
   SIGNATURES
============================================================ */

function initSignaturePads() {
  ["sigTech", "sigCust"].forEach(id => {
    const canvas = document.getElementById(id);
    if (!canvas) return;

    const ctx = canvas.getContext("2d");

    // DEVICE‑ADAPTIVE SCALING
function resizeCanvas() {
  const ratio = window.devicePixelRatio || 1;

  // Only scale if canvas is not already scaled
  const needScale =
    canvas.width !== canvas.offsetWidth * ratio ||
    canvas.height !== canvas.offsetHeight * ratio;

  if (!needScale) return;

  // Save existing drawing
  const old = ctx.getImageData(0, 0, canvas.width, canvas.height);

  // Resize canvas
  canvas.width = canvas.offsetWidth * ratio;
  canvas.height = canvas.offsetHeight * ratio;

  ctx.setTransform(1, 0, 0, 1, 0, 0); // reset transform
  ctx.scale(ratio, ratio);

  ctx.lineWidth = 2;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.imageSmoothingEnabled = false;

  // Restore drawing
  ctx.putImageData(old, 0, 0);
}

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    // DRAWING LOGIC
    let drawing = false;

    canvas.addEventListener("pointerdown", e => {
      drawing = true;
      ctx.beginPath();
      ctx.moveTo(e.offsetX, e.offsetY);
    });

    canvas.addEventListener("pointermove", e => {
      if (!drawing) return;
      ctx.lineTo(e.offsetX, e.offsetY);
      ctx.stroke();
    });

    canvas.addEventListener("pointerup", () => drawing = false);
    canvas.addEventListener("pointerleave", () => drawing = false);
  });

  // CLEAR BUTTONS
  document.querySelectorAll("[data-clear]").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.getAttribute("data-clear");
      const canvas = document.getElementById(id);
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    });
  });
}

/* ============================================================
   PDF + EMAIL
============================================================ */

function pdfOptions(filename) {
  return {
    margin: 10,
    filename,
    image: { type: "jpeg", quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true, scrollY: 0 },
    jsPDF: { unit: "pt", format: "letter", orientation: "portrait" },
    pagebreak: { mode: ["css"] }
  };
}

function buildPdfName() {
  const phone = (document.getElementById("custPhone").value || "")
    .replace(/\D/g,"") || "no-phone";

  const name = (document.getElementById("custName").value || "no-name")
    .trim().replace(/\s+/g,"_");

  const d = new Date();
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  const yyyy = d.getFullYear();

  return `${phone}_${name}_${yyyy}${mm}${dd}_Invoice.pdf`;
}

function openPrefilledEmail(pdfName, to) {
  const cc = "a2zproservices@gmail.com";
  const subject = encodeURIComponent("Garage Door Inspection Report");
  const body = encodeURIComponent("Attached is your inspection report.\n\n");

  window.location.href = `mailto:${to}?cc=${cc}&subject=${subject}&body=${body}`;

  const picker = document.getElementById("attachPicker");
  if (picker) setTimeout(() => picker.click(), 800);
}

/* ============================================================
   DOM READY
============================================================ */

document.addEventListener("DOMContentLoaded", () => {

  loadJobInfo();
  bindJobInfo();
  initSignaturePads();

  /* ============================================================
     DATE + EXPIRATION
  ============================================================ */

  const quoteDateEl = document.getElementById("quoteDate");
  if (quoteDateEl) {
    const d = new Date();
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    const dd = String(d.getDate(), "0");
    const yyyy = d.getFullYear();
    quoteDateEl.textContent = `${mm}/${dd}/${yyyy}`;
  }

  const expEl = document.getElementById("quoteExpiration");
  if (expEl) {
    const d = new Date();
    d.setDate(d.getDate() + 14);
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    const dd = String(d.getDate()).padStart(2, "0");
    const yyyy = d.getFullYear();
    expEl.textContent = `Payment due upon receipt`;
  }

  /* ============================================================
   QUOTE SECTION (5‑column system)
============================================================ */

function formatCurrency(value) {
  if (value == null) return "";
  value = String(value); // Safari fix
  const num = parseFloat(value.replace(/[^0-9.-]/g, ""));
  if (isNaN(num)) return "";
  return num.toLocaleString("en-US", { style: "currency", currency: "USD" });
}

function parseCurrency(value) {
  if (value == null) return 0;
  value = String(value); // Safari fix
  return parseFloat(value.replace(/[^0-9.-]/g, "")) || 0;
}

function updateExtended(row) {
  const qty = parseFloat(row.querySelector(".item-qty").value) || 0;
  const unit = parseCurrency(row.querySelector(".item-unit").value);
  const ext = qty * unit;
  row.querySelector(".item-ext").value = formatCurrency(ext);
}

function updateGrandTotal() {
  let total = 0;
  document.querySelectorAll(".item-ext").forEach(ext => {
    total += parseCurrency(ext.value);
  });
  document.getElementById("quoteGrandTotal").textContent =
    total.toLocaleString("en-US", { style: "currency", currency: "USD" });
}

// Handle qty + unit cost changes
document.addEventListener("input", (e) => {
  const row = e.target.closest(".item-row");
  if (!row) return;

  if (
    e.target.classList.contains("item-qty") ||
    e.target.classList.contains("item-unit")
  ) {
    updateExtended(row);
    updateGrandTotal();
  }
});

// Format currency ONLY on blur
document.addEventListener("blur", (e) => {
  if (e.target.classList.contains("item-unit")) {
    e.target.value = formatCurrency(e.target.value);
    const row = e.target.closest(".item-row");
    updateExtended(row);
    updateGrandTotal();
  }
}, true);

// Add new row
document.getElementById("addItemBtn").addEventListener("click", () => {
  const list = document.getElementById("itemsList");

  const row = document.createElement("div");
  row.className = "item-row";
  row.innerHTML = `
    <textarea class="item-desc" placeholder="Item description..."></textarea>
    <input class="item-qty" type="number" min="1" value="1">
    <input class="item-unit" placeholder="Unit cost">
    <input class="item-ext" placeholder="Total" readonly>
    <button class="item-remove">×</button>
  `;

  list.appendChild(row);
});

// Remove row
document.addEventListener("click", (e) => {
  if (e.target.classList.contains("item-remove")) {
    e.target.closest(".item-row").remove();
    updateGrandTotal();
  }
});

  /* ============================================================
     PDF BUTTON
  ============================================================ */

  const pdfBtn = document.getElementById("pdfBtn");
  const actionsBar = document.querySelector(".actions");

  if (pdfBtn) {
    pdfBtn.addEventListener("click", () => {
      const pdfName = buildPdfName();
      const el = document.getElementById("pdfCaptureArea");

      actionsBar.classList.add("no-print");

      html2pdf()
        .set(pdfOptions(pdfName))
        .from(el)
        .save()
        .then(() => {
          actionsBar.classList.remove("no-print");
        });
    });
  }

  /* ============================================================
     EMAIL PDF BUTTON
  ============================================================ */

  const emailBtn = document.getElementById("emailBtn");
  if (emailBtn) {
    emailBtn.addEventListener("click", () => {
      const pdfName = buildPdfName();
      const to = document.getElementById("custEmail").value || "";
      const el = document.getElementById("pdfCaptureArea");

      actionsBar.classList.add("no-print");

      html2pdf()
        .set(pdfOptions(pdfName))
        .from(el)
        .outputPdf("blob")
        .then((blob) => {
          actionsBar.classList.remove("no-print");

          const url = URL.createObjectURL(blob);
          const iframe = document.createElement("iframe");
          iframe.style.display = "none";
          iframe.src = url;
          document.body.appendChild(iframe);

          setTimeout(() => {
            const link = document.createElement("a");
            link.href = url;
            link.download = pdfName;
            link.click();

            setTimeout(() => {
              document.body.removeChild(iframe);
              URL.revokeObjectURL(url);
            }, 500);

            setTimeout(() => openPrefilledEmail(pdfName, to), 600);
          }, 200);
        });
    });
  }

  /* ============================================================

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TotalLine Garage Door Invoice</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- External Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- Stylesheet -->
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
  <div class="app" id="appRoot">

    <!-- PDF CAPTURE AREA START -->
    <div id="pdfCaptureArea">

      <!-- HEADER -->
      <div class="header">
        <div class="header-left">
          <img 
            src="https://raw.githubusercontent.com/chaficsm1/totalLine_Garage/main/garage.png"
            class="logo-img"
            crossorigin="anonymous"
          >
          <div class="header-title">TotalLine Garage Door Invoice</div>
        </div>

        <div class="header-right">
          <div class="header-company">
            <div class="company-line">(913) 687-8382</div>
            <div class="company-line">a2zproservices@gmail.com</div>
            <div id="invoiceDate" class="company-line"></div>
          </div>
        </div>
      </div>

      <div class="header-divider"></div>

      <!-- JOB INFO PAGE -->
      <div id="jobInfoPage">
        <div class="job-info">

          <div class="job-header">
            <h3>Job Information</h3>
          </div>

          <!-- Customer Detailed Address -->
          <div class="info-grid three-col">
            <div class="info-field">
              <label class="info-label">Customer Name</label>
              <input id="custName" class="info-input" />
            </div>
            <div class="info-field">
              <label class="info-label">Customer Phone</label>
              <input id="custPhone" class="info-input" />
            </div>
            <div class="info-field">
              <label class="info-label">Customer Email</label>
              <input id="custEmail" class="info-input" />
            </div>
            <div class="info-field">
              <label class="info-label">Street Address</label>
              <input id="custStreet" class="info-input" />
            </div>
            <div class="info-field">
              <label class="info-label">City/State</label>
              <input id="custCity" class="info-input" />
            </div>
            <div class="info-field">
              <label class="info-label">ZIP Code</label>
              <input id="custZip" class="info-input" />
            </div>
          </div>

          <!-- Technician Info -->
          <div class="info-grid three-col">
            <div class="info-field">
              <label class="info-label">Technician Name</label>
              <input id="techName" class="info-input" />
            </div>
            <div class="info-field">
              <label class="info-label">Technician Phone</label>
              <input id="techPhone" class="info-input" />
            </div>
            <div class="info-field">
              <label class="info-label">Technician Email</label>
              <input id="techEmail" class="info-input" />
            </div>
          </div>

        </div>
      </div>

      <!-- QUOTE SECTION -->
      <div class="section-band">
        <div class="section-band-title">Invoice</div>
      </div>

      <div class="section" id="itemsSection">
        <div id="itemsList">

          <div class="item-row">
            <textarea class="item-desc" placeholder="Item description..."></textarea>
            <input class="item-qty" type="number" min="1" value="1">
            <input class="item-unit" type="text" placeholder="Unit cost">
            <input class="item-ext" type="text" placeholder="Total" readonly>
            <button class="item-remove">×</button>
          </div>

        </div>

        <button id="addItemBtn" class="add-row-btn">+ Add invoice item</button>
      </div>

      <div id="invoiceTotalRow" class="invoice-total-row">
        <span class="invoice-total-label">Grand Total:</span>
        <span id="invoiceGrandTotal" class="invoice-total-value">$0.00</span>
      </div>

      <div id="restockFee" class="invoice-disclaimer important-callout icon-callout">
        <span class="icon">ℹ️</span>
        <span class="text">
          Important: Parts costs are non refundable once order is approved and deposit is collected.<br>
          Invoice due upon receipt.
        </span>
      </div>



      <!-- SIGNATURES -->
      <div class="section-band">
        <div class="section-band-title">Signatures</div>
      </div>

      <div class="section signatures">
        <div class="signature-grid">

          <div class="signature-block">
            <div class="signature-label">Technician Signature</div>
            <canvas id="sigTech" class="signature-pad"></canvas>
            <button class="small-btn" data-clear="sigTech">Clear</button>
          </div>

          <div class="signature-block">
            <div class="signature-label">Customer Signature</div>
            <canvas id="sigCust" class="signature-pad"></canvas>
            <button class="small-btn" data-clear="sigCust">Clear</button>
          </div>

        </div>
      </div>

    </div>
    <!-- PDF CAPTURE AREA END -->

    <!-- ACTION BUTTONS -->
    <div class="actions">
      <button id="resetBtn" class="btn btn-secondary">Reset</button>
      <button id="pdfBtn" class="btn btn-primary">Generate PDF</button>
      <button id="emailBtn" class="btn btn-primary">Email PDF</button>
    </div>

    <!-- Hidden File Picker -->
    <input type="file" id="attachPicker" style="display:none" />

    <!-- External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- App Logic -->
<script src="assets/js/app.js"></script>

  </div>
</body>
</html>
